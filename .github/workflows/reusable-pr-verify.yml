name: "Reusable: PR Verify"

on:
  workflow_call:
    inputs:
      docker_platforms:
        description: "Docker platforms to build for"
        required: false
        type: string
        default: "linux/arm64/v8,linux/amd64"
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    needs: [npm-verify]
    if: ${{ always() && (needs.npm-verify.result == 'success' || needs.npm-verify.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          set -e
          SERVICE_NAME=$(cat package.json | jq -r '.name')
          echo "Building ${SERVICE_NAME}:beta"
          docker buildx build \
            --platform ${{ inputs.docker_platforms }} \
            --push \
            -f Dockerfile \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${SERVICE_NAME}:beta \
            .

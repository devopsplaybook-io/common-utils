name: "Reusable: PR Verify"

on:
  workflow_call:
    inputs:
      docker_platforms:
        description: "Docker platforms to build for"
        required: false
        type: string
        default: "linux/arm64/v8,linux/amd64"
      node_app_directories:
        description: "JSON array of Node.js app directories to build, lint, and test"
        required: false
        type: string
        default: ""
      node_version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "22"
    secrets:
      DOCKER_HUB_USERNAME:
        required: true
      DOCKER_HUB_ACCESS_TOKEN:
        required: true

jobs:
  node-build:
    if: inputs.node_app_directories != ''
    strategy:
      matrix:
        app: ${{ fromJSON(inputs.node_app_directories) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          set -e
          SERVICE_NAME=$(cat package.json | jq -r '.name')
          echo "Building ${SERVICE_NAME}:beta"
          docker buildx build \
            --platform ${{ inputs.docker_platforms }} \
            --push \
            -f Dockerfile \
            -t ${{ secrets.DOCKER_HUB_USERNAME }}/${SERVICE_NAME}:beta \
            .
